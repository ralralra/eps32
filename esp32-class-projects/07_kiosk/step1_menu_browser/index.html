<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>과자 키오스크</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 0 auto; padding: 1rem; }
    h1 { color: #7c3aed; text-align: center; }
    .points { text-align: center; font-size: 1.2rem; margin-bottom: 1rem; }
    .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .item { padding: 1rem; border: 2px solid #7c3aed; border-radius: 10px;
            text-align: center; cursor: pointer; user-select: none; }
    .item:active { background: #ede9fe; }
    .cart { margin-top: 1rem; border-top: 2px dashed #ccc; padding-top: 0.5rem; }
    .total { font-size: 1.4rem; font-weight: bold; text-align: right; }
    button.pay { width: 100%; font-size: 1.3rem; padding: 0.8rem; margin-top: 0.5rem;
                 background: #7c3aed; color: white; border: none; border-radius: 10px; }
    #msg { text-align: center; font-size: 1.1rem; color: #16a34a; min-height: 1.5rem; }
  </style>
</head>
<body>
  <h1>🍪 과자 키오스크</h1>
  <div class="points">남은 포인트: <b id="points">10000</b>P</div>

  <div class="menu" id="menu"></div>

  <div class="cart">
    <ul id="cart"></ul>
    <div class="total">합계: <span id="total">0</span>P</div>
    <button class="pay" onclick="pay()">결제하기</button>
    <div id="msg"></div>
  </div>

  <script>
    // 상품 목록
    var products = [
      { name: "새우깡", price: 700 },
      { name: "초코파이", price: 500 },
      { name: "콜라", price: 1000 },
      { name: "사탕", price: 200 }
    ];
    var cart = [];

    // 포인트는 localStorage에 저장 (없으면 10000으로 시작)
    function getPoints() { return parseInt(localStorage.getItem("points") || "10000"); }
    function setPoints(p) { localStorage.setItem("points", p); document.getElementById("points").innerText = p; }

    // 상품 버튼 그리기
    function drawMenu() {
      var m = document.getElementById("menu");
      m.innerHTML = "";
      products.forEach(function(p, i) {
        var d = document.createElement("div");
        d.className = "item";
        d.innerHTML = "<b>" + p.name + "</b><br>" + p.price + "P";
        d.onclick = function() { addToCart(i); };
        m.appendChild(d);
      });
    }

    function addToCart(i) {
      cart.push(products[i]);
      drawCart();
    }

    function drawCart() {
      var ul = document.getElementById("cart");
      ul.innerHTML = "";
      var total = 0;
      cart.forEach(function(p) {
        var li = document.createElement("li");
        li.textContent = p.name + " - " + p.price + "P";
        ul.appendChild(li);
        total += p.price;
      });
      document.getElementById("total").innerText = total;
      return total;
    }

    function pay() {
      var total = drawCart();
      if (total === 0) { msg("상품을 담아주세요", "#d97706"); return; }
      var points = getPoints();
      if (points < total) { msg("포인트가 부족합니다!", "#dc2626"); return; }
      setPoints(points - total);          // 모의결제: 포인트 차감
      msg("결제 완료! " + total + "P 사용", "#16a34a");
      cart = [];
      drawCart();
    }

    function msg(text, color) {
      var m = document.getElementById("msg");
      m.innerText = text; m.style.color = color;
    }

    // 시작
    drawMenu();
    setPoints(getPoints());
  </script>
</body>
</html>
