<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="800" viewBox="0 0 1240 800" font-family="Pretendard, Noto Sans CJK KR, sans-serif">
<rect width="1240" height="800" fill="#ffffff"/>
<text x="620.0" y="52" font-size="26" font-weight="bold" fill="#1b2536" text-anchor="middle">4회차 교실 환경 모니터 — 셀 3개 동시 연결</text>
<text x="620.0" y="80" font-size="15" fill="#56677e" text-anchor="middle">온습도(DHT)는 Digital 블록, 빛·소리는 Analog 블록 A2~A5 위치 — 세 개를 한꺼번에 꽂아요</text>
<rect x="80" y="130" width="280" height="130" rx="12" fill="#1758a8"/>
<circle cx="220" cy="178" r="26" fill="#0d3b73"/>
<text x="220" y="238" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">온습도 (DHT) 셀</text>
<path d="M360 195 C 470 195, 470 195, 560 195" fill="none" stroke="#e07b00" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
<text x="460" y="180" font-size="13" fill="#56677e" text-anchor="middle">G·V·S 3핀 케이블</text>
<rect x="560" y="130" width="330" height="130" rx="12" fill="#1b7a96"/>
<text x="725" y="164" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Digital 블록 · '6' 칸 포트</text>
<rect x="655" y="180" width="140" height="56" rx="8" fill="#f5d75d"/>
<text x="725" y="216" font-size="28" font-weight="bold" fill="#3a3000" text-anchor="middle">GPIO 27</text>
<rect x="920" y="164" width="270" height="62" rx="8" fill="#0f2240"/>
<text x="1055" y="202" font-size="16" font-weight="bold" fill="#8fd8f0" text-anchor="middle" font-family="Courier New">#define DHTPIN 27</text>
<rect x="80" y="295" width="280" height="130" rx="12" fill="#1758a8"/>
<circle cx="220" cy="343" r="26" fill="#0d3b73"/>
<text x="220" y="403" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">빛 셀</text>
<path d="M360 360 C 470 360, 470 360, 560 360" fill="none" stroke="#2e6be6" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
<text x="460" y="345" font-size="13" fill="#56677e" text-anchor="middle">G·V·S 3핀 케이블</text>
<rect x="560" y="295" width="330" height="130" rx="12" fill="#1b7a96"/>
<text x="725" y="329" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Analog 블록 · A3 자리</text>
<rect x="655" y="345" width="140" height="56" rx="8" fill="#f5d75d"/>
<text x="725" y="381" font-size="28" font-weight="bold" fill="#3a3000" text-anchor="middle">GPIO 34</text>
<rect x="920" y="329" width="270" height="62" rx="8" fill="#0f2240"/>
<text x="1055" y="367" font-size="16" font-weight="bold" fill="#8fd8f0" text-anchor="middle" font-family="Courier New">#define LIGHT 34</text>
<rect x="80" y="460" width="280" height="130" rx="12" fill="#1758a8"/>
<circle cx="220" cy="508" r="26" fill="#0d3b73"/>
<text x="220" y="568" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">소리 셀</text>
<path d="M360 525 C 470 525, 470 525, 560 525" fill="none" stroke="#1f9d55" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
<text x="460" y="510" font-size="13" fill="#56677e" text-anchor="middle">G·V·S 3핀 케이블</text>
<rect x="560" y="460" width="330" height="130" rx="12" fill="#1b7a96"/>
<text x="725" y="494" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Analog 블록 · A2 자리</text>
<rect x="655" y="510" width="140" height="56" rx="8" fill="#f5d75d"/>
<text x="725" y="546" font-size="28" font-weight="bold" fill="#3a3000" text-anchor="middle">GPIO 35</text>
<rect x="920" y="494" width="270" height="62" rx="8" fill="#0f2240"/>
<text x="1055" y="532" font-size="16" font-weight="bold" fill="#8fd8f0" text-anchor="middle" font-family="Courier New">#define SOUND 35</text>
<rect x="60" y="640" width="1130" height="120" rx="12" fill="#e2f6fb"/>
<text x="85" y="674" font-size="15" fill="#1b2536">① 세 셀 모두 꽂은 뒤, 코드의 세 #define 번호가 위 GPIO와 같은지 확인 (다른 자리에 꽂았으면 번호만 수정)</text>
<text x="85" y="704" font-size="15" fill="#1b2536">② 빛·소리는 반드시 A2~A5 위치! (A0·A1 자리는 WiFi 켜면 아날로그 불가)</text>
<text x="85" y="734" font-size="15" fill="#1b2536">③ 시리얼 모니터(115200)로 세 값이 다 나오는지 먼저 확인 → 그다음 클라우드 업로드 코드로!</text>
<text x="85" y="764" font-size="14" font-weight="bold" fill="#a92433">⚠ DHT 값이 nan이면: 2초에 1번만 측정(delay 2000 이상) + 핀 번호 확인</text>
</svg>