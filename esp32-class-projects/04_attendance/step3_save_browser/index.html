<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>출석 체크</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }
    h1 { color: #2563eb; }
    input {
      font-size: 1.2rem;
      padding: 0.6rem;
      width: 80%;
      box-sizing: border-box;
    }
    button {
      font-size: 1.2rem;
      padding: 0.7rem 2rem;
      margin-top: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .small { font-size: 0.9rem; padding: 0.4rem 1rem; background: #888; }
    ul { text-align: left; margin-top: 1.5rem; }
    li { font-size: 1.1rem; padding: 0.3rem 0; }
  </style>
</head>
<body>
  <h1>📋 우리 반 출석</h1>
  <p>이름을 입력하고 출석 버튼을 누르세요</p>
  <input id="name" placeholder="이름">
  <br>
  <button onclick="check()">출석하기</button>

  <h3>출석한 사람</h3>
  <ul id="list"></ul>
  <button class="small" onclick="clearAll()">전체 지우기</button>

  <script>
    // 저장된 출석 명단을 화면에 그리기
    function draw() {
      var data = JSON.parse(localStorage.getItem("attend") || "[]");
      var list = document.getElementById("list");
      list.innerHTML = "";
      for (var i = 0; i < data.length; i++) {
        var li = document.createElement("li");
        li.textContent = data[i].name + " - " + data[i].time;
        list.appendChild(li);
      }
    }

    // 출석하기
    function check() {
      var name = document.getElementById("name").value;
      if (name === "") {
        alert("이름을 입력하세요");
        return;
      }
      var time = new Date().toLocaleTimeString();
      // 1) 저장소에서 기존 명단 꺼내기
      var data = JSON.parse(localStorage.getItem("attend") || "[]");
      // 2) 새 출석 추가
      data.push({ name: name, time: time });
      // 3) 다시 저장소에 넣기
      localStorage.setItem("attend", JSON.stringify(data));
      // 4) 화면 새로 그리기
      document.getElementById("name").value = "";
      draw();
    }

    // 전체 지우기
    function clearAll() {
      if (confirm("정말 전체 삭제할까요?")) {
        localStorage.removeItem("attend");
        draw();
      }
    }

    // 페이지 열릴 때 저장된 명단 불러오기
    window.onload = draw;
  </script>
</body>
</html>
