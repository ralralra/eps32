<rect x="60" y="620" width="1130" height="120" rx="12" fill="#e2f6fb"/>
<text x="85" y="654" font-size="15" fill="#1b2536">① Digital 블록에서 포트 하나 선택 — 위 칸이 TRIG, 아래 칸이 ECHO (예: 6·7 칸 → 27·14)</text>
<text x="85" y="684" font-size="15" fill="#1b2536">② pulseIn(ECHO, HIGH)로 왕복 시간 → × 0.034 ÷ 2 = 거리(cm)</text>
<text x="85" y="714" font-size="15" fill="#1b2536">③ 자로 실측해서 비교해 보면 신뢰가 생겨요 — 우산 거치·접근 경보의 핵심!</text>
<text x="85" y="744" font-size="14" font-weight="bold" fill="#a92433">⚠ TRIG·ECHO를 서로 바꿔 꽂으면 항상 0이 나와요 — 안 되면 두 신호선부터 의심!</text>
</svg>