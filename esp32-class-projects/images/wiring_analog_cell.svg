<text x="837" y="373.5" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">SIG</text>
<path d="M616 446.6666666666667 C 715.0 446.6666666666667, 715.0 369.0, 814 369.0" fill="none" stroke="#e07b00" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
<rect x="60" y="620" width="1130" height="120" rx="12" fill="#e2f6fb"/>
<text x="85" y="654" font-size="15" fill="#1b2536">① Analog 블록에서 A2~A5 위치 포트 선택 — A2=35 · A3=34 · A4=36 · A5=39</text>
<text x="85" y="684" font-size="15" fill="#1b2536">② 코드의 핀 번호를 꽂은 자리의 GPIO로: #define SIG 34  →  analogRead(SIG)  (0~4095)</text>
<text x="85" y="714" font-size="15" fill="#1b2536">③ 시리얼 모니터(115200)로 값 관찰 — 손으로 가리기 / 소리 지르기 / 물에 담그기!</text>
<text x="85" y="744" font-size="14" font-weight="bold" fill="#a92433">⚠ A0·A1 자리(GPIO 2·4)는 WiFi를 켜면 아날로그를 못 읽어요 — 아날로그 셀은 꼭 A2~A5 위치에!</text>
</svg>