<text x="920" y="252" font-size="13" fill="#56677e">(둘 다 말고 한 번에 하나만,</text>
<text x="920" y="270" font-size="13" fill="#56677e">  대문자로 — on·On은 무반응)</text>
<rect x="60" y="520" width="1130" height="200" rx="12" fill="#e2f6fb"/>
<text x="85" y="554" font-size="15" fill="#1b2536">① 왼쪽 아래 ＋ 버튼 → 새 탭 생성 → 탭 이름 더블클릭 → '설정'으로 변경 (코드의 getSheetByName("설정")과 철자 일치!)</text>
<text x="85" y="586" font-size="15" fill="#1b2536">② LED 켜기 : 설정 탭 A1에 ON 입력 → ESP32가 10초마다 확인(폴링) → 최대 10초 뒤 LED 켜짐</text>
<text x="85" y="618" font-size="15" fill="#1b2536">③ LED 끄기 : A1의 ON을 지우고 OFF로 바꿔 쓰기 → 다음 폴링 때 꺼짐</text>
<text x="85" y="650" font-size="15" fill="#1b2536">④ 확인 방법 : 브라우저에서 웹앱URL?mode=cmd 열기 → 화면에 A1의 값(ON)이 보이면 서버 쪽 성공!</text>
<text x="85" y="682" font-size="15" fill="#1b2536">⑤ 시트1 탭은 손대지 않기 — ESP32가 보내는 측정값이 자동으로 쌓이는 곳이에요</text>
