<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>내 리모컨</title>
  <style>
    /* 선택자 { 속성: 값; } — 우리 과정 공통 규칙: 파란 계열·큰 버튼·모바일 우선 */
    body {
      font-family: sans-serif;
      text-align: center;
      background: #EDF3FE;
    }
    h1 { color: #2E6BE6; }
    button {
      font-size: 24px;
      padding: 20px 40px;     /* 안쪽 여백 → 버튼이 커져요 */
      margin: 10px;
      border-radius: 12px;    /* 모서리 둥글기 */
      border: none;
      background: #2E6BE6;    /* 색상 번호(RGB) */
      color: white;
    }
  </style>
</head>
<body>
  <h1>Team1 리모컨</h1>
  <p>버튼을 눌러 보세요</p>
  <button>LED 켜기</button>
  <button>LED 끄기</button>
</body>
</html>
